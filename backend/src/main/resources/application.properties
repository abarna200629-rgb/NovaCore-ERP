spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/erp_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:kannaki}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=${PORT:8080}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# API Mail Fallback properties
mail.provider=${MAIL_PROVIDER:BREVO}
brevo.api.key=${BREVO_API_KEY:}
mail.from=${MAIL_FROM:erpmanagement2028@gmail.com}
mail.from.name=${MAIL_FROM_NAME:NovaCore ERP}

spring.devtools.restart.enabled=false

# CORS & JWT Secret References
cors.allowed.origins=${CORS_ALLOWED_ORIGIN}
jwt.secret=${JWT_SECRET_KEY}
